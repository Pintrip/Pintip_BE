services:
  mysql:
    image: mysql:8.4
    container_name: pintrip-mysql
    environment:
      MYSQL_DATABASE: pintrip
      MYSQL_USER: pintrip
      MYSQL_PASSWORD: pintrip
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3307:3306"
    volumes:
      - pintrip-mysql-data:/var/lib/mysql
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./src/main/resources/db/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  pintrip-mysql-data:
