name: Dev CI/CD

on:
  pull_request:
    branches:
      - develop
    types:
      - closed
  workflow_dispatch: # 수동 실행 지원

jobs:
  build:
    runs-on: ubuntu-latest
    # 수정: PR이 merge되었거나, 혹은 수동으로 실행(workflow_dispatch)했을 때만 작동하도록 변경
    if: |
      (github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'develop') ||
      github.event_name == 'workflow_dispatch'

    steps:
      # v3 -> v4로 업데이트 (Node 버전 관련 경고 해결)
      - name: Checkout
        uses: actions/checkout@v4

      # v3 -> v4로 업데이트 및 Gradle 캐시 추가 (빌드 속도 향상)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
          cache: 'gradle' # Gradle 라이브러리 캐싱으로 배포 속도 업!

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Get current time
        uses: 1466587594/get-current-time@v2
        id: current-time
        with:
          format: YYYY-MM-DDTHH-mm-ss
          utcOffset: "+09:00"

      - name: Show Current Time
        run: echo "CurrentTime=${{ steps.current-time.outputs.formattedTime }}"

      - name: Generate deployment package
        run: |
          mkdir -p deploy
          # plain.jar를 제외하고 오직 실행 가능한(Executable) jar만 복사하기 위해 조건문 추가
          cp build/libs/*[!plain].jar deploy/application.jar
          cp Procfile deploy/Procfile
          cp -r .ebextensions_dev deploy/.ebextensions 2>/dev/null || cp -r .ebextensions deploy/.ebextensions || true
          cp -r .platform deploy/.platform 2>/dev/null || true
          cd deploy && zip -r deploy.zip .

      - name: Beanstalk Deploy
        uses: einaregilsson/beanstalk-deploy@v22 # 최신 버전 권장
        with:
          aws_access_key: ${{ secrets.AWS_ACTION_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_ACTION_SECRET_ACCESS_KEY }}
          application_name: pintrip-develop
          environment_name: Pintrip-develop-env-1
          version_label: github-action-${{ steps.current-time.outputs.formattedTime }}
          region: ap-northeast-1
          deployment_package: deploy/deploy.zip
          wait_for_deployment: false # 빠른 피드백을 원하면 false 유지, 배포 성공 여부까지 확인하려면 true