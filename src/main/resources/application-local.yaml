# 로컬 개발: Docker Compose(MySQL)
# 호스트 3306에 로컬 MySQL이 있으면 충돌하므로 Docker는 3307로 매핑
spring:
  docker:
    compose:
      enabled: true
      lifecycle-management: start-only
  datasource:
    url: jdbc:mysql://localhost:3307/pintrip
    username: pintrip
    password: pintrip
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
  sql:
    init:
      mode: never
