# Elastic Beanstalk 운영 프로필 (SPRING_PROFILES_ACTIVE=prod)
# RDS·CORS 등은 EB 환경 속성에서 주입 — src/main/docs/배포_EB_체크리스트.md 참고

server:
  port: 5000

spring:
  docker:
    compose:
      enabled: false
  datasource:
    url: jdbc:mysql://${RDS_HOSTNAME}:${RDS_PORT:3306}/${RDS_DB_NAME}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
  sql:
    init:
      mode: never

app:
  cors:
    # 콤마 구분. https://*.vercel.app = Vercel Preview·브랜치 배포 Origin
    # http://pintrip-fe… = Vercel rewrite가 HTTP EB로 프록시할 때 Origin이 http로 바뀌는 경우 대비
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://pintrip-fe.vercel.app,http://pintrip-fe.vercel.app,https://*.vercel.app,http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000}

# Spring Boot 3.4+ : endpoint access 기본값이 none → health 노출 시 access 명시 필요
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      access: read-only
      show-details: never
